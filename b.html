<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Axium Loading</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		:root {
			--accent: #1D9E75;
			--accent-dim: #0F6E56;
			--accent-glow: rgba(29,158,117,0.14);
			--fg: #111110;
			--fg2: #5F5E5A;
			--fg3: #888780;
			--bg: #ffffff;
			--bg2: #F1EFE8;
			--border: rgba(0,0,0,0.1);
			--font-display: 'Syne', sans-serif;
			--font-mono: 'IBM Plex Mono', monospace;
			--font-body: system-ui, sans-serif;
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--fg: #f0ede6;
				--fg2: #9e9b93;
				--fg3: #6b6860;
				--bg: #1a1916;
				--bg2: #232220;
				--border: rgba(255,255,255,0.1);
				--accent-glow: rgba(29,158,117,0.2);
			}
		}

		body {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 1.2rem;
			background:
				radial-gradient(circle at 14% 10%, var(--accent-glow), transparent 34%),
				radial-gradient(circle at 90% 88%, rgba(29,158,117,0.08), transparent 30%),
				var(--bg);
			color: var(--fg);
			font-family: var(--font-display);
			overflow: hidden;
		}

		.noise {
			pointer-events: none;
			position: fixed;
			inset: 0;
			background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
			background-size: 3px 3px;
			mix-blend-mode: soft-light;
			opacity: 0.25;
		}

		.shell {
			width: min(560px, 100%);
			border: 0.5px solid var(--border);
			border-radius: 16px;
			background: color-mix(in srgb, var(--bg) 88%, transparent);
			backdrop-filter: blur(10px);
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
			overflow: hidden;
			animation: rise 650ms ease both;
		}

		.topbar {
			padding: 0.75rem 0.95rem;
			border-bottom: 0.5px solid var(--border);
			background: var(--bg);
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.dot {
			width: 9px;
			height: 9px;
			border-radius: 50%;
		}

		.content {
			padding: 2rem 1.35rem 1.2rem;
			text-align: center;
		}

		.logo-wrap {
			width: 78px;
			height: 78px;
			margin: 0 auto 1rem;
			border-radius: 22px;
			background: linear-gradient(145deg, var(--accent), var(--accent-dim));
			display: grid;
			place-items: center;
			box-shadow:
				0 12px 30px rgba(29, 158, 117, 0.3),
				0 0 0 0 rgba(29, 158, 117, 0.35);
			animation: pulseGlow 2s ease-in-out infinite;
			position: relative;
			isolation: isolate;
		}

		.logo-wrap::after {
			content: "";
			position: absolute;
			inset: -12px;
			border-radius: 28px;
			border: 1px solid rgba(29, 158, 117, 0.35);
			transform: scale(0.9);
			animation: ring 1.9s ease-out infinite;
			z-index: -1;
		}

		.logo {
			font-size: 26px;
			font-weight: 800;
			color: #fff;
			letter-spacing: -1.2px;
		}

		h1 {
			font-size: clamp(1.4rem, 4vw, 2rem);
			letter-spacing: -1px;
			margin-bottom: 0.45rem;
		}

		h1 em {
			font-style: normal;
			color: var(--accent);
		}

		.sub {
			font-family: var(--font-body);
			color: var(--fg2);
			font-size: 13px;
			line-height: 1.65;
			max-width: 40ch;
			margin: 0 auto 1.35rem;
		}

		.progress-shell {
			width: 100%;
			height: 10px;
			border: 0.5px solid var(--border);
			border-radius: 999px;
			overflow: hidden;
			background: var(--bg2);
			margin-bottom: 0.8rem;
		}

		.progress-fill {
			width: 0%;
			height: 100%;
			border-radius: inherit;
			background: linear-gradient(90deg, var(--accent), #34c293);
			box-shadow: 0 0 18px rgba(29, 158, 117, 0.38);
			animation: load 3.4s ease-in-out infinite;
			transform-origin: left center;
		}

		.status-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1rem;
			font-family: var(--font-mono);
			font-size: 11px;
			color: var(--fg3);
			margin-bottom: 0.7rem;
		}

		.status-text {
			color: var(--accent);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			text-align: left;
		}

		.steps {
			border-top: 0.5px solid var(--border);
			padding-top: 0.75rem;
			display: grid;
			gap: 0.45rem;
			text-align: left;
		}

		.step {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 11px;
			font-family: var(--font-mono);
			color: var(--fg3);
			letter-spacing: 0.3px;
		}

		.step-dot {
			width: 7px;
			height: 7px;
			border-radius: 50%;
			background: var(--fg3);
			transition: background 220ms ease;
		}

		.step.active .step-dot {
			background: var(--accent);
			box-shadow: 0 0 0 4px rgba(29, 158, 117, 0.14);
		}

		.step.active { color: var(--fg2); }

		.footer {
			border-top: 0.5px solid var(--border);
			padding: 0.8rem 1rem;
			display: flex;
			justify-content: space-between;
			align-items: center;
			font-family: var(--font-mono);
			font-size: 10px;
			color: var(--fg3);
			letter-spacing: 0.4px;
			background: var(--bg);
		}

		@keyframes rise {
			from { opacity: 0; transform: translateY(10px); }
			to { opacity: 1; transform: translateY(0); }
		}

		@keyframes pulseGlow {
			0%, 100% { box-shadow: 0 12px 30px rgba(29, 158, 117, 0.3), 0 0 0 0 rgba(29, 158, 117, 0.35); }
			50% { box-shadow: 0 14px 36px rgba(29, 158, 117, 0.38), 0 0 0 12px rgba(29, 158, 117, 0); }
		}

		@keyframes ring {
			0% { opacity: 0.7; transform: scale(0.8); }
			100% { opacity: 0; transform: scale(1.25); }
		}

		@keyframes load {
			0% { width: 8%; }
			25% { width: 38%; }
			55% { width: 68%; }
			80% { width: 88%; }
			100% { width: 100%; }
		}

		@media (max-width: 520px) {
			.content { padding: 1.35rem 0.9rem 1rem; }
			.logo-wrap { width: 68px; height: 68px; border-radius: 18px; }
			.logo { font-size: 22px; }
			.footer { flex-direction: column; align-items: flex-start; gap: 4px; }
		}
	</style>
</head>
<body>
	<div class="noise" aria-hidden="true"></div>

	<main class="shell" role="status" aria-live="polite">
		<div class="topbar">
			<span class="dot" style="background:#E24B4A"></span>
			<span class="dot" style="background:#EF9F27"></span>
			<span class="dot" style="background:#1D9E75"></span>
		</div>

		<section class="content">
			<div class="logo-wrap" aria-hidden="true">
				<span class="logo">Ax</span>
			</div>

			<h1>Preparing your <em>market view</em></h1>
			<p class="sub">Axium is syncing live signals, sentiment streams, and portfolio metrics. This takes only a moment.</p>

			<div class="progress-shell" aria-hidden="true">
				<div class="progress-fill"></div>
			</div>

			<div class="status-row">
				<span class="status-text" id="statusText">Connecting to live market feeds...</span>
				<span id="percent">12%</span>
			</div>

			<div class="steps" id="steps">
				<div class="step active"><span class="step-dot"></span>INITIALIZING SESSION</div>
				<div class="step"><span class="step-dot"></span>SYNCING PRICE DATA</div>
				<div class="step"><span class="step-dot"></span>ANALYZING SENTIMENT</div>
				<div class="step"><span class="step-dot"></span>LOADING DASHBOARD</div>
			</div>
		</section>

		<footer class="footer">
			<span>AXIUM // SECURE BOOT LAYER</span>
			<span id="clock"></span>
		</footer>
	</main>

	<script>
		const statuses = [
			{ text: 'Connecting to live market feeds...', value: '12%', step: 0 },
			{ text: 'Syncing real-time pricing channels...', value: '37%', step: 1 },
			{ text: 'Running sentiment and momentum models...', value: '68%', step: 2 },
			{ text: 'Finalizing widgets and alerts...', value: '94%', step: 3 },
			{ text: 'Ready. Entering dashboard...', value: '100%', step: 3 }
		];

		const statusText = document.getElementById('statusText');
		const percent = document.getElementById('percent');
		const steps = Array.from(document.querySelectorAll('.step'));
		const clock = document.getElementById('clock');

		let index = 0;

		function applyStatus(item) {
			statusText.textContent = item.text;
			percent.textContent = item.value;
			steps.forEach((step, i) => {
				step.classList.toggle('active', i <= item.step);
			});
		}

		function tick() {
			index = (index + 1) % statuses.length;
			applyStatus(statuses[index]);
		}

		function updateClock() {
			const now = new Date();
			clock.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
		}

		applyStatus(statuses[index]);
		updateClock();
		setInterval(tick, 850);
		setInterval(updateClock, 1000);
	</script>
</body>
</html>
